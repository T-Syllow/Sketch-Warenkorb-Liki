<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mini Shop</title>
  <style>
    :root {
      --bg-start: #fff4dd;
      --bg-end: #ffd8b2;
      --card: #fffdf8;
      --text: #1f1c16;
      --accent: #ff6a00;
      --accent-strong: #e25400;
      --success: #1f9d55;
      --shadow: 0 14px 30px rgba(126, 67, 20, 0.16);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Avenir Next Condensed", "Futura", "Trebuchet MS", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% -10%, #ffffff 0%, transparent 55%),
                  radial-gradient(circle at 100% 100%, #ffd096 5%, transparent 40%),
                  linear-gradient(165deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
      padding: calc(20px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
    }

    .app {
      width: min(100%, 420px);
      background: color-mix(in oklab, var(--card) 92%, white);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    h1 {
      margin: 6px 6px 14px;
      font-size: clamp(1.5rem, 4vw, 2rem);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .gallery {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .gallery img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 2px solid rgba(255, 255, 255, 0.8);
      transform: translateY(12px);
      opacity: 0;
      animation: reveal 600ms ease forwards;
    }

    .gallery img:nth-child(2) {
      animation-delay: 120ms;
    }

    .gallery img:nth-child(3) {
      animation-delay: 240ms;
    }

    .buy-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #fff;
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      box-shadow: 0 10px 20px rgba(226, 84, 0, 0.34);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .buy-btn:active {
      transform: translateY(1px) scale(0.995);
      box-shadow: 0 5px 12px rgba(226, 84, 0, 0.3);
    }

    .success {
      min-height: 430px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 320ms ease, transform 320ms ease;
      pointer-events: none;
      position: absolute;
      inset: 18px;
      background: linear-gradient(160deg, #f2fff5, #d5f8e0);
      border-radius: 22px;
      border: 2px solid rgba(31, 157, 85, 0.25);
    }

    .success strong {
      font-size: clamp(2rem, 9vw, 3.6rem);
      line-height: 1.05;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .container {
      position: relative;
    }

    .container.completed .shop {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .container.completed .success {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    @keyframes reveal {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (min-width: 768px) {
      .app {
        width: 460px;
      }

      .gallery img {
        height: 165px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="container" id="checkout-view">
      <section class="shop">
        <h1>Produkt Galerie</h1>
        <div class="gallery">
          <img src="./img/1.jpg" alt="Produktbild 1">
          <img src="./img/2.jpg" alt="Produktbild 2">
          <img src="./img/3.jpg" alt="Produktbild 3">
        </div>
        <button class="buy-btn" id="buy-now" type="button">Jetzt kaufen</button>
      </section>
      <section class="success" aria-live="polite">
        <strong>Bestellung erfolgreich</strong>
      </section>
    </div>
  </main>

  <script>
    const buyButton = document.getElementById("buy-now");
    const checkoutView = document.getElementById("checkout-view");

    buyButton.addEventListener("click", () => {
      checkoutView.classList.add("completed");
    });
  </script>
</body>
</html>
